name: Nightly MongoDB Backup to Google Drive

concurrency:
  group: nightly-mongodb-backup
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BACKUP_PREFIX: lte-backup
      BACKUP_TZ: Asia/Bahrain
      BACKUP_ENCRYPTION_KEY: ${{ secrets.BACKUP_ENCRYPTION_KEY }}
      MONGO_URI: ${{ secrets.MONGO_URI }}
      GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
      GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
      GDRIVE_OAUTH_CLIENT_ID: ${{ secrets.GDRIVE_OAUTH_CLIENT_ID }}
      GDRIVE_OAUTH_CLIENT_SECRET: ${{ secrets.GDRIVE_OAUTH_CLIENT_SECRET }}
      GDRIVE_OAUTH_REFRESH_TOKEN: ${{ secrets.GDRIVE_OAUTH_REFRESH_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run backup
        run: node scripts/backupToDrive.js

      - name: Write success summary
        if: success()
        run: |
          {
            echo "## Backup Status"
            echo ""
            echo "- Result: success"
            echo "- Trigger: ${{ github.event_name }}"
            echo "- Commit: ${{ github.sha }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Open incident issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Backup workflow failed: ${context.runNumber}`;
            const body = [
              'The nightly MongoDB backup workflow failed.',
              '',
              `- Workflow: ${context.workflow}`,
              `- Run number: ${context.runNumber}`,
              `- Event: ${context.eventName}`,
              `- Commit: ${context.sha}`,
              `- Run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['backup', 'incident'],
            });
