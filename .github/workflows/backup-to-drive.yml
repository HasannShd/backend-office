name: Nightly MongoDB Backup to Google Drive

concurrency:
  group: nightly-mongodb-backup
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BACKUP_PREFIX: lte-backup
      BACKUP_TZ: Asia/Bahrain
      BACKUP_ENCRYPTION_KEY: ${{ secrets.BACKUP_ENCRYPTION_KEY }}
      MONGO_URI: ${{ secrets.MONGO_URI }}
      GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
      GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
      GDRIVE_OAUTH_CLIENT_ID: ${{ secrets.GDRIVE_OAUTH_CLIENT_ID }}
      GDRIVE_OAUTH_CLIENT_SECRET: ${{ secrets.GDRIVE_OAUTH_CLIENT_SECRET }}
      GDRIVE_OAUTH_REFRESH_TOKEN: ${{ secrets.GDRIVE_OAUTH_REFRESH_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run backup
        run: node scripts/backupToDrive.js

      - name: Write backup summary
        if: always()
        run: |
          RESULT="${{ job.status }}"
          {
            echo "## Backup Status"
            echo ""
            echo "- Result: ${RESULT}"
            echo "- Trigger: ${{ github.event_name }}"
            echo "- Commit: ${{ github.sha }}"
            echo "- Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Post GitHub backup notification
        if: always()
        continue-on-error: true
        uses: actions/github-script@v8
        with:
          script: |
            const title = 'Backup status feed';
            const label = 'backup-status';
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const status = '${{ job.status }}';

            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              labels: label,
              per_page: 100,
            });

            let issue = existing.find((entry) => entry.title === title);

            if (!issue) {
              const created = await github.rest.issues.create({
                owner,
                repo,
                title,
                body: 'This issue is used as a running notification feed for nightly backup results.',
                labels: [label],
              });
              issue = created.data;
            }

            const headlineMap = {
              success: 'Backup completed successfully.',
              failure: 'Backup workflow failed.',
              cancelled: 'Backup workflow was cancelled.',
            };

            const body = [
              headlineMap[status] || `Backup workflow finished with status: ${status}.`,
              '',
              `- Result: ${status}`,
              `- Run number: ${context.runNumber}`,
              `- Event: ${context.eventName}`,
              `- Commit: ${context.sha}`,
              `- Run: https://github.com/${owner}/${repo}/actions/runs/${context.runId}`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issue.number,
              body,
            });
