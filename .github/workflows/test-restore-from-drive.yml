name: Manual Restore Test From Google Drive Backup

concurrency:
  group: manual-restore-test
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

on:
  workflow_dispatch:
    inputs:
      backup_filename:
        description: Exact backup archive filename to restore, leave blank to use the latest matching archive
        required: false
        default: ''
      backup_prefix:
        description: Prefix used when auto-selecting the latest backup archive
        required: false
        default: lte-backup
      drop_existing:
        description: Clear the target test database before restoring
        required: false
        type: boolean
        default: true
      notify_feed:
        description: Post result into the backup status feed issue
        required: false
        type: boolean
        default: true

jobs:
  restore-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BACKUP_ENCRYPTION_KEY: ${{ secrets.BACKUP_ENCRYPTION_KEY }}
      GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
      GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
      GDRIVE_OAUTH_CLIENT_ID: ${{ secrets.GDRIVE_OAUTH_CLIENT_ID }}
      GDRIVE_OAUTH_CLIENT_SECRET: ${{ secrets.GDRIVE_OAUTH_CLIENT_SECRET }}
      GDRIVE_OAUTH_REFRESH_TOKEN: ${{ secrets.GDRIVE_OAUTH_REFRESH_TOKEN }}
      RESTORE_TEST_MONGO_URI: ${{ secrets.RESTORE_TEST_MONGO_URI }}
      BACKUP_FILENAME: ${{ inputs.backup_filename }}
      BACKUP_PREFIX: ${{ inputs.backup_prefix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Validate restore test configuration
        run: |
          test -n "$RESTORE_TEST_MONGO_URI" || { echo "Missing RESTORE_TEST_MONGO_URI secret."; exit 1; }
          test -n "$GDRIVE_FOLDER_ID" || { echo "Missing GDRIVE_FOLDER_ID secret."; exit 1; }

      - name: Download backup archive from Drive
        id: download
        run: |
          export BACKUP_DOWNLOAD_DIR="$RUNNER_TEMP/restore-test-backup"
          node scripts/downloadBackupFromDrive.js | tee "$RUNNER_TEMP/download-backup.log"
          grep '^BACKUP_' "$RUNNER_TEMP/download-backup.log" >> "$GITHUB_ENV"

      - name: Verify backup archive
        run: |
          MONGO_URI="$RESTORE_TEST_MONGO_URI" \
          BACKUP_ARCHIVE="$BACKUP_ARCHIVE_PATH" \
          node scripts/restoreFromBackup.js
        env:
          RESTORE_VERIFY_ONLY: 'true'

      - name: Restore backup into test database
        run: |
          MONGO_URI="$RESTORE_TEST_MONGO_URI" \
          BACKUP_ARCHIVE="$BACKUP_ARCHIVE_PATH" \
          node scripts/restoreFromBackup.js
        env:
          RESTORE_DROP_EXISTING: ${{ inputs.drop_existing && 'true' || 'false' }}

      - name: Write restore summary
        if: always()
        run: |
          RESULT="${{ job.status }}"
          {
            echo "## Restore Test Status"
            echo ""
            echo "- Result: ${RESULT}"
            echo "- Trigger: ${{ github.event_name }}"
            echo "- Commit: ${{ github.sha }}"
            echo "- Backup file: ${BACKUP_FILE_NAME:-unknown}"
            echo "- Backup modified: ${BACKUP_FILE_MODIFIED:-unknown}"
            echo "- Target secret: RESTORE_TEST_MONGO_URI"
            echo "- Drop existing: ${{ inputs.drop_existing }}"
            echo "- Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Post GitHub restore notification
        if: always() && inputs.notify_feed
        continue-on-error: true
        uses: actions/github-script@v8
        with:
          script: |
            const title = 'Backup status feed';
            const label = 'backup-status';
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const status = '${{ job.status }}';
            const backupFile = process.env.BACKUP_FILE_NAME || 'unknown';

            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              labels: label,
              per_page: 100,
            });

            let issue = existing.find((entry) => entry.title === title);

            if (!issue) {
              const created = await github.rest.issues.create({
                owner,
                repo,
                title,
                body: 'This issue is used as a running notification feed for nightly backup results.',
                labels: [label],
              });
              issue = created.data;
            }

            const headlineMap = {
              success: 'Manual restore test completed successfully.',
              failure: 'Manual restore test failed.',
              cancelled: 'Manual restore test was cancelled.',
            };

            const body = [
              headlineMap[status] || `Manual restore test finished with status: ${status}.`,
              '',
              `- Result: ${status}`,
              `- Backup file: ${backupFile}`,
              `- Target secret: RESTORE_TEST_MONGO_URI`,
              `- Drop existing: ${{ inputs.drop_existing }}`,
              `- Run number: ${context.runNumber}`,
              `- Event: ${context.eventName}`,
              `- Commit: ${context.sha}`,
              `- Run: https://github.com/${owner}/${repo}/actions/runs/${context.runId}`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issue.number,
              body,
            });
